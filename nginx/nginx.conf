worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── HLS segment cache ──────────────────────────────────────
    # .ts segments are immutable once written — cache aggressively
    # .m3u8 playlists change during live streams — short TTL
    proxy_cache_path /var/cache/nginx/hls
        levels=1:2
        keys_zone=hls_cache:20m
        max_size=2g
        inactive=1h
        use_temp_path=off;

    log_format main '$remote_addr - "$request" $status $body_bytes_sent '
                    'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream minio_backend {
        server minio:9000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── API: all app routes ──────────────────────────────────
        location / {
            proxy_pass         http://api_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;    # long timeout for uploads
            client_max_body_size 2g;
        }

        # ── HLS delivery: proxy MinIO + cache at edge ────────────
        location /hls/ {
            proxy_pass         http://minio_backend/hls/;
            proxy_set_header   Host minio:9000;

            proxy_cache        hls_cache;
            proxy_cache_key    "$uri";

            # .ts segments are immutable — cache for 1 hour
            proxy_cache_valid  200 1h;
            # .m3u8 playlists — short TTL for live streams
            proxy_cache_valid  302 5s;

            # Serve stale content while revalidating (zero-downtime)
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            proxy_cache_lock on;

            # HLS CORS headers (required for video.js / hls.js players)
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;

            # Expose cache status in response (HIT / MISS / BYPASS)
            add_header X-Cache-Status $upstream_cache_status always;

            # Range requests for segment seeking
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            expires 1h;
        }
    }
}
