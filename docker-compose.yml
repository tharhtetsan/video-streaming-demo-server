services:

  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: streampass
      POSTGRES_DB: streamdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d streamdb"]
      interval: 5s
      retries: 10

  # ─── Redis (Celery broker) ────────────────────────────────
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ─── MinIO (S3-compatible storage) ───────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  # ─── MinIO bucket bootstrap ───────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/videos &&
        mc mb --ignore-existing local/hls &&
        mc anonymous set download local/hls
      "

  # ─── FastAPI app ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://stream:streampass@db:5432/streamdb
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_VIDEO_BUCKET: videos
      S3_HLS_BUCKET: hls
      JWT_SECRET: supersecretkey_change_in_prod
      CDN_BASE_URL: http://localhost/hls
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
      - ./templates:/app/templates

  # ─── Celery worker ────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://stream:streampass@db:5432/streamdb
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_VIDEO_BUCKET: videos
      S3_HLS_BUCKET: hls
      JWT_SECRET: supersecretkey_change_in_prod
      CDN_BASE_URL: http://localhost/hls
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./worker:/app/worker
      - /tmp/hls_work:/tmp/hls_work   # shared FFmpeg scratch space

  # ─── Flower (Celery monitor) ──────────────────────────────
  flower:
    image: mher/flower:2.0
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: >
      celery
      --broker=redis://redis:6379/0
      flower
      --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  # ─── Nginx (reverse proxy + HLS CDN cache) ───────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - minio

volumes:
  pg_data:
  minio_data:
